<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>体育与健康知识练习</title>
    <style>
:root {
  color-scheme: light;
  --bg: #f4f1e8;
  --card: #fbf8f0;
  --text: #2f3a32;
  --subtle: #66756b;
  --primary: #5c7a63;
  --primary-dark: #4e6854;
  --border: #d8d2c2;
  --correct-bg: #e6f1e8;
  --correct-text: #2f6b3b;
  --wrong-bg: #f8ebe6;
  --wrong-text: #b85c4a;
}

* {
  box-sizing: border-box;
}

body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
  background: var(--bg);
  color: var(--text);
}

.app {
  max-width: 860px;
  margin: 0 auto;
  padding: 24px 16px 40px;
}

.header {
  margin-bottom: 18px;
}

.header h1 {
  margin: 0 0 8px;
  font-size: 34px;
}

.header p {
  margin: 0;
  color: var(--subtle);
  font-size: 18px;
}

.card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 24px;
  box-shadow: 0 10px 30px rgba(15, 23, 42, 0.05);
}

.card + .card {
  margin-top: 16px;
}

.hidden {
  display: none;
}

.mode-list {
  display: flex;
  gap: 12px;
  margin: 16px 0 20px;
  flex-wrap: wrap;
}

.mode-item {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 14px 16px;
  border: 1px solid var(--border);
  border-radius: 12px;
  cursor: pointer;
}

.range-box {
  display: flex;
  gap: 14px;
  flex-wrap: wrap;
  margin: 0 0 20px;
}

.range-item {
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.range-item label {
  color: var(--subtle);
  font-size: 16px;
}

.range-item input {
  width: 160px;
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 12px 14px;
  font-size: 18px;
}

.primary-btn,
.secondary-btn {
  border: 0;
  border-radius: 12px;
  padding: 14px 20px;
  font-size: 18px;
  cursor: pointer;
}

.primary-btn {
  background: var(--primary);
  color: #fff;
}

.secondary-btn {
  background: #e6e0d2;
  color: #4e6854;
}

.primary-btn:hover:not(:disabled) {
  background: var(--primary-dark);
}


.primary-btn:disabled {
  opacity: 0.5;
  cursor: not-allowed;
}

.topbar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 12px;
  margin-bottom: 14px;
  flex-wrap: wrap;
}

.badge,
.pill {
  display: inline-flex;
  align-items: center;
  border-radius: 999px;
  padding: 7px 12px;
  font-size: 15px;
  background: #ece8dc;
  color: #55685b;
}

.progress-text {
  color: var(--subtle);
  font-size: 16px;
}

.progress-track {
  height: 10px;
  background: #ddd6c8;
  border-radius: 999px;
  overflow: hidden;
  margin-bottom: 16px;
}

.progress-bar {
  height: 100%;
  width: 0;
  background: linear-gradient(90deg, #7ea07f, #5c7a63);
}

.question-meta {
  display: flex;
  gap: 8px;
  margin-bottom: 8px;
  flex-wrap: wrap;
}

.question-text {
  font-size: 28px;
  line-height: 1.6;
  margin: 8px 0 20px;
}

.options {
  display: grid;
  gap: 12px;
}

.option-btn {
  width: 100%;
  text-align: left;
  border: 1px solid var(--border);
  background: #fff;
  border-radius: 14px;
  padding: 16px 18px;
  font-size: 19px;
  line-height: 1.5;
  cursor: pointer;
}

.option-btn:hover:not(:disabled) {
  border-color: var(--primary);
  background: #f4f0e7;
}

.option-btn.correct {
  background: var(--correct-bg);
  color: var(--correct-text);
  border-color: #86efac;
}

.option-btn.wrong {
  background: var(--wrong-bg);
  color: var(--wrong-text);
  border-color: #fca5a5;
}

.option-btn:disabled {
  cursor: default;
}


.feedback {
  min-height: 34px;
  margin-top: 16px;
  font-size: 18px;
  color: var(--subtle);
}

.feedback.correct {
  color: var(--correct-text);
}

.feedback.wrong {
  color: var(--wrong-text);
}

.wrong-pill {
  background: #f6e7df;
  color: var(--wrong-text);
}

.result-actions {
  justify-content: flex-start;
}

.result-message {
  margin: 10px 0 0;
  font-size: 22px;
  font-weight: 600;
}

.actions {
  margin-top: 12px;
  display: flex;
  justify-content: flex-end;
}

@media (max-width: 640px) {
  .app {
    padding: 16px 12px 28px;
  }

  .header h1 {
    font-size: 28px;
  }

  .question-text {
    font-size: 23px;
  }
}

    </style>
  </head>
  <body>
    <div class="app">
      <header class="header">
        <div>
          <h1>体育与健康知识练习</h1>
          <p>每次一道题，答完立即判分。每轮结束后统计结果，如有错题则继续只练本轮错题，直到全部答对。</p>
        </div>
      </header>

      <section id="setup" class="card">
        <h2>开始练习</h2>
        <div class="mode-list">
          <label class="mode-item">
            <input type="radio" name="mode" value="ordered" checked />
            <span>顺序练习</span>
          </label>
          <label class="mode-item">
            <input type="radio" name="mode" value="shuffle" />
            <span>乱序练习</span>
          </label>
        </div>
        <div class="range-box">
          <div class="range-item">
            <label for="rangeStart">起始题号</label>
            <input id="rangeStart" type="number" min="1" max="200" value="1" />
          </div>
          <div class="range-item">
            <label for="rangeEnd">结束题号</label>
            <input id="rangeEnd" type="number" min="1" max="200" value="200" />
          </div>
        </div>
        <button id="startBtn" class="primary-btn">开始</button>
      </section>

      <section id="quiz" class="card hidden">
        <div class="topbar">
          <div id="phaseLabel" class="badge">第一轮</div>
          <div id="progressText" class="progress-text"></div>
        </div>

        <div class="progress-track">
          <div id="progressBar" class="progress-bar"></div>
        </div>

        <div class="question-meta">
          <span id="questionType" class="pill"></span>
          <span id="questionNumber" class="pill"></span>
          <span id="wrongCount" class="pill wrong-pill"></span>
        </div>

        <h2 id="questionText" class="question-text"></h2>

        <div id="options" class="options"></div>

        <div id="feedback" class="feedback"></div>

        <div class="actions">
          <button id="nextBtn" class="primary-btn" disabled>下一题</button>
        </div>
      </section>

      <section id="result" class="card hidden">
        <h2 id="resultTitle">本轮完成</h2>
        <p id="resultSummary"></p>
        <p id="resultMessage" class="result-message"></p>
        <div class="actions result-actions">
          <button id="restartBtn" class="primary-btn">开始</button>
        </div>
      </section>
    </div>

function shuffle(list) {
  const arr = [...list];
  for (let i = arr.length - 1; i > 0; i -= 1) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function resetRoundStats() {
  state.roundStats = {
    total: state.queue.length,
    correct: 0,
    wrong: 0,
  };
}

function resetAll() {
  const selectedMode = document.querySelector('input[name="mode"]:checked')?.value || 'ordered';
  state.mode = selectedMode;
  state.round = 1;
  state.currentIndex = 0;
  state.answered = false;
  state.pendingRetry = false;
  state.completed = false;
  const startNumber = Number(rangeStartInput.value) || 1;
  const endNumber = Number(rangeEndInput.value) || 200;
  if (startNumber > endNumber) {
    alert('起始题号不能大于结束题号。');
    return false;
  }
  state.selectedRange = { start: startNumber, end: endNumber };
  const scopedQuestions = questions.filter((item) => item.number >= startNumber && item.number <= endNumber);
  if (!scopedQuestions.length) {
    alert('这个题号范围内没有题目。');
    return false;
  }
  state.queue = selectedMode === 'shuffle' ? shuffle(scopedQuestions) : [...scopedQuestions];
  state.nextQueue = [];
  resetRoundStats();
  return true;
}

function prepareRetryRound() {
  state.round += 1;
  state.currentIndex = 0;
  state.answered = false;
  state.pendingRetry = false;
  state.queue = state.mode === 'shuffle' ? shuffle(state.nextQueue) : [...state.nextQueue];
  state.nextQueue = [];
  resetRoundStats();
}

function getCurrentQuestion() {
  return state.queue[state.currentIndex];
}

function getRandomMessage(list) {
  return list[Math.floor(Math.random() * list.length)];
}

function renderQuestion() {
  const item = getCurrentQuestion();
  if (!item) return;

  state.answered = false;
  clearAutoAdvanceTimer();
  nextBtn.disabled = true;
  feedbackEl.textContent = '';
  feedbackEl.className = 'feedback';

  phaseLabel.textContent = `第 ${state.round} 轮`;
  progressText.textContent = `第 ${state.currentIndex + 1} / ${state.queue.length} 题`;
  progressBar.style.width = `${((state.currentIndex + 1) / state.queue.length) * 100}%`;
  questionType.textContent = item.type === 'single' ? '单项选择题' : '判断题';
  questionNumber.textContent = `题号 ${item.number}`;
  wrongCount.textContent = `本轮错题 ${state.roundStats.wrong}`;
  questionText.textContent = item.question;

  optionsEl.innerHTML = '';
  Object.entries(item.options).forEach(([key, text]) => {
    const button = document.createElement('button');
    button.className = 'option-btn';
    button.type = 'button';
    button.dataset.key = key;
    button.innerHTML = `<strong>${key}</strong> ${text}`;
    button.addEventListener('click', () => answerQuestion(key));
    optionsEl.appendChild(button);
  });
}

function clearAutoAdvanceTimer() {
  if (state.autoAdvanceTimer) {
    clearTimeout(state.autoAdvanceTimer);
    state.autoAdvanceTimer = null;
  }
}

function answerQuestion(selected) {
  if (state.answered) return;
  state.answered = true;
  nextBtn.disabled = false;

  const item = getCurrentQuestion();
  const correct = item.answer;
  const isRight = selected === correct;
  const buttons = [...optionsEl.querySelectorAll('.option-btn')];

  buttons.forEach((button) => {
    const key = button.dataset.key;
    button.disabled = true;
    if (key === correct) button.classList.add('correct');
    if (!isRight && key === selected) button.classList.add('wrong');
  });

  if (isRight) {
    state.roundStats.correct += 1;
    feedbackEl.textContent = '回答正确，1 秒后自动下一题。';
    feedbackEl.className = 'feedback correct';
    state.autoAdvanceTimer = setTimeout(() => {
      state.autoAdvanceTimer = null;
      advance();
    }, 1000);
  } else {
    state.roundStats.wrong += 1;
    wrongCount.textContent = `本轮错题 ${state.roundStats.wrong}`;
    feedbackEl.textContent = `回答错误，正确答案是 ${correct}。`;
    feedbackEl.className = 'feedback wrong';
    state.nextQueue.push(item);
  }

}

function showRoundResult() {
  clearAutoAdvanceTimer();
  quizEl.classList.add('hidden');
  resultEl.classList.remove('hidden');

  const { total, correct, wrong } = state.roundStats;
  resultSummary.textContent = `本轮答题 ${total} 题，答对 ${correct} 题，答错 ${wrong} 题。`;

  if (wrong > 0) {
    resultTitle.textContent = `第 ${state.round} 轮完成`;
    resultMessage.textContent = getRandomMessage(encourageMessages);
    restartBtn.textContent = '开始错题练习';
    state.pendingRetry = true;
    state.completed = false;
  } else {
    resultTitle.textContent = '全部练习完成';
    resultMessage.textContent = getRandomMessage(praiseMessages);
    restartBtn.textContent = '重新开始';
    state.pendingRetry = false;
    state.completed = true;
  }
}

function advance() {
  if (!state.answered) return;

  if (state.currentIndex < state.queue.length - 1) {
    state.currentIndex += 1;
    renderQuestion();
    return;
  }

  showRoundResult();
}

function startFirstRound() {
  const ok = resetAll();
  if (!ok) return;
  setupEl.classList.add('hidden');
  resultEl.classList.add('hidden');
  quizEl.classList.remove('hidden');
  renderQuestion();
}

function handleResultAction() {
  clearAutoAdvanceTimer();
  if (state.pendingRetry) {
    prepareRetryRound();
    resultEl.classList.add('hidden');
    quizEl.classList.remove('hidden');
    renderQuestion();
    return;
  }

  resultEl.classList.add('hidden');
  setupEl.classList.remove('hidden');
}

startBtn.addEventListener('click', startFirstRound);
nextBtn.addEventListener('click', advance);
restartBtn.addEventListener('click', handleResultAction);
</script>
  </body>
</html>
